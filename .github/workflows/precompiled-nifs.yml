name: Precompiled NIFs

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "lib/ex_graphblas/native.ex"
      - ".github/workflows/precompiled-nifs.yml"
  pull_request:
    paths:
      - ".github/workflows/precompiled-nifs.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_nifs:
    name: NIF - ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-macos-none, os: macos-14 }
          - { target: x86_64-macos-none, os: macos-14 }
          - { target: aarch64-linux-gnu, os: ubuntu-22.04 }
          - { target: x86_64-linux-gnu, os: ubuntu-22.04 }
          - { target: x86_64-linux-musl, os: ubuntu-22.04 }
          - { target: aarch64-linux-musl, os: ubuntu-22.04 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.12.0

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.4"

      - name: Install SuiteSparse (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgraphblas-dev pkg-config

      - name: Install SuiteSparse (macOS)
        if: runner.os == 'macOS'
        run: brew install suite-sparse

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-nif-${{ matrix.target }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-nif-${{ matrix.target }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Build NIF from source
        env:
          EX_GRAPHBLAS_BUILD: "1"
          MIX_ENV: prod
        run: mix compile

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${PROJECT_VERSION}"
          BASENAME="Elixir.GraphBLAS.Native"
          mkdir -p artifacts
          tar czf "artifacts/${BASENAME}-v${VERSION}-${{ matrix.target }}.so.tar.gz" -C priv/lib .
          echo "Packaged: artifacts/${BASENAME}-v${VERSION}-${{ matrix.target }}.so.tar.gz"

      - name: Artifact attestation
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: artifacts/*.tar.gz

      - name: Verify artifact
        shell: bash
        run: |
          if [ ! -f artifacts/*.tar.gz ]; then
            echo "::error::Build did not produce artifact"
            exit 1
          fi
          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Elixir.GraphBLAS.Native-v${{ env.PROJECT_VERSION }}-${{ matrix.target }}
          path: artifacts/*.tar.gz

  release:
    name: Create release
    needs: build_nifs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Flatten tarballs
        run: |
          mkdir -p nifs
          find release-artifacts -name '*.tar.gz' -exec cp {} nifs/ \;
          ls -la nifs/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nifs/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_hex:
    name: Publish to Hex.pm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      EX_GRAPHBLAS_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.4"

      - name: Install SuiteSparse
        run: |
          sudo apt-get update
          sudo apt-get install -y libgraphblas-dev pkg-config

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-publish-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-publish-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile NIF from source
        env:
          MIX_ENV: prod
        run: mix compile

      - name: Generate checksum file from GitHub Release
        run: mix zigler_precompiled.download GraphBLAS.Native --all --print 2>/dev/null

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
