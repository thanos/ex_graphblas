name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test -- Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # - elixir: "1.17.3"
          #   otp: "26"
          # - elixir: "1.20.0-rc.3"
          #   otp: "28.4.1"
          # # Latest stable versions
          # - elixir: "1.19.5"
          #   otp: "28.4.1"
          #   coverage: true
          # Previous versions for compatibility
          - elixir: "1.18.4"
            otp: "27.3"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            clang \
            cmake \
            libomp-dev \
            git
      - name: Clone SuiteSparse:GraphBLAS
        run: git clone --depth 1 --branch v9.4.5 https://github.com/DrTimothyAldenDavis/GraphBLAS.git

      - name: Configure GraphBLAS with CMake
        working-directory: GraphBLAS
        run: |
          GRAPHBLAS_PREFIX="${{ github.workspace }}/.graphblas/v9.4.5"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GRAPHBLAS_PREFIX" \
            -DGRAPHBLAS_BUILD_PKGCONFIG=ON

      - name: Cache GraphBLAS installation
        uses: actions/cache@v4
        id: graphblas-cache
        with:
          path: ${{ github.workspace }}/.graphblas/v9.4.5
          key: graphblas-v9.4.5-${{ runner.os }}-${{ runner.arch }}

      - name: Build and install GraphBLAS
        if: steps.graphblas-cache.outputs.cache-hit != 'true'
        working-directory: GraphBLAS
        run: |
          GRAPHBLAS_PREFIX="${{ github.workspace }}/.graphblas/v9.4.5"
          cmake --build build -j"$(nproc)"
          cmake --install build

      - name: Verify GraphBLAS installation and set PKG_CONFIG_PATH
        run: |
          prefix="${{ github.workspace }}/.graphblas/v9.4.5"

          # Export PKG_CONFIG_PATH for this step and future steps
          export PKG_CONFIG_PATH="$prefix/lib/pkgconfig:$prefix/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

          # Export LD_LIBRARY_PATH so the dynamic loader can find libgraphblas
          export LD_LIBRARY_PATH="$prefix/lib:$prefix/lib64:${LD_LIBRARY_PATH:-}"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

          # Verify a GraphBLAS pkg-config file exists (casing may differ)
          if ! find "$prefix" -type f \( -name 'GraphBLAS.pc' -o -name 'graphblas.pc' \) | grep -q '\.pc$'; then
            echo "GraphBLAS pkg-config file not found under $prefix"
            find "$prefix" -maxdepth 4 -type f -name '*.pc' || true
            exit 1
          fi

          # Verify pkg-config can resolve the module (try both common names)
          pkg-config --print-errors --modversion GraphBLAS || pkg-config --print-errors --modversion graphblas
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-
      - name: Install dependencies
        run: mix deps.get

      - name: Install Zig (avoid mix zig.get on OTP 27.x due to SSL incompatibility)
        run: |
          ZIG_VERSION="0.13.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          ZIG_DIR="${PWD}/zig-linux-x86_64-${ZIG_VERSION}"
          echo "${ZIG_DIR}" >> "$GITHUB_PATH"
          "${ZIG_DIR}/zig" version

      - name: Verify Zig is available
        run: |
          command -v zig
          zig version

      - name: Compile (warnings as errors)
        env:
          EX_GRAPHBLAS_BUILD: "1"
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
