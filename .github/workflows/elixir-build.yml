name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test -- Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # - elixir: "1.17.3"
          #   otp: "26"
          - elixir: "1.20.0-rc.3"
            otp: "28.4.1"
          # Latest stable versions
          - elixir: "1.19.5"
            otp: "28.4.1"
            coverage: true
          # Previous versions for compatibility
          - elixir: "1.18.4"
            otp: "27.3"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            clang \
            cmake \
            libomp-dev \
            git

      - name: Clone SuiteSparse:GraphBLAS
        run: git clone --depth 1 --branch v9.4.5 https://github.com/DrTimothyAldenDavis/GraphBLAS.git

      - name: Configure GraphBLAS with CMake
        working-directory: GraphBLAS
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DGRAPHBLAS_BUILD_PKGCONFIG=ON

      - name: Cache GraphBLAS installation
        uses: actions/cache@v4
        id: graphblas-cache
        with:
          path: /usr/local
          key: graphblas-v9.4.5-${{ runner.os }}-${{ runner.arch }}

      - name: Build and install GraphBLAS
        if: steps.graphblas-cache.outputs.cache-hit != 'true'
        working-directory: GraphBLAS
        run: |
          cmake --build build -j"$(nproc)"
          sudo cmake --install build
          sudo ldconfig

      - name: Verify GraphBLAS installation and set PKG_CONFIG_PATH
        run: |
          # Set PKG_CONFIG_PATH so pkg-config can see GraphBLAS
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib64/pkgconfig" >> "$GITHUB_ENV"

          # Verify a GraphBLAS pkg-config file exists (casing may differ)
          if ! sudo find /usr/local -type f \( -name 'GraphBLAS.pc' -o -name 'graphblas.pc' \) | grep -q '\.pc$'; then
            echo "GraphBLAS pkg-config file not found under /usr/local"
            sudo find /usr/local -maxdepth 4 -type f -name '*.pc' || true
            exit 1
          fi

          # Verify pkg-config can resolve the module (try both common names)
          pkg-config --print-errors --modversion GraphBLAS || pkg-config --print-errors --modversion graphblas

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Download Zig (for Zigler)
        run: mix zig.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Verify NIFs compiled
        run: |
          find _build -maxdepth 5 -type f \( -name "*.so" -o -name "*.dylib" \) -print
          echo "---"
          find deps/zigler/priv -type f -name "*.so" -o -name "*.dylib" 2>/dev/null || echo "No pre-built Zigler libs"

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: mix test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: mix coveralls.github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
