name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test -- Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18.4"
            otp: "27"
            coverage: true
          # - elixir: "1.17.3"
          #   otp: "26"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install SuiteSparse:GraphBLAS and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgraphblas-dev \
            pkg-config \
            build-essential \
            clang \
            cmake \
            libomp-dev
          sudo ldconfig
          pkg-config --modversion graphblas

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Download Zig (for Zigler)
        run: mix zig.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Verify NIFs compiled
        run: |
          find _build -maxdepth 5 -type f \( -name "*.so" -o -name "*.dylib" \) -print
          echo "---"
          find deps/zigler/priv -type f -name "*.so" -o -name "*.dylib" 2>/dev/null || echo "No pre-built Zigler libs"

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: mix test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: mix coveralls.github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
