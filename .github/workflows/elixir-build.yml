name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test -- Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18.4"
            otp: "27"
            coverage: true
          # - elixir: "1.17.3"
          #   otp: "26"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            clang \
            cmake \
            libomp-dev \
            git

      - name: Clone SuiteSparse:GraphBLAS
        run: git clone --depth 1 --branch v9.4.5 https://github.com/DrTimothyAldenDavis/GraphBLAS.git

      - name: Configure GraphBLAS with CMake
        working-directory: GraphBLAS
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DGRAPHBLAS_BUILD_PKGCONFIG=ON

      - name: Cache GraphBLAS installation
        uses: actions/cache@v4
        id: graphblas-cache
        with:
          path: /usr/local
          key: graphblas-v9.4.5-${{ runner.os }}-${{ runner.arch }}

      - name: Build and install GraphBLAS
        if: steps.graphblas-cache.outputs.cache-hit != 'true'
        working-directory: GraphBLAS
        run: |
          cmake --build build -j"$(nproc)"
          sudo cmake --install build
          sudo ldconfig

      - name: Verify GraphBLAS installation
        run: |
          pc_dir="$(sudo find /usr/local -type f -name 'graphblas.pc' -printf '%h\n' | head -n 1)"
          if [ -z "$pc_dir" ]; then
            echo "graphblas.pc not found under /usr/local"
            sudo find /usr/local -maxdepth 4 -type f -name '*.pc' -print || true
            exit 1
          fi
          echo "PKG_CONFIG_PATH=$pc_dir" >> "$GITHUB_ENV"
          export PKG_CONFIG_PATH="$pc_dir"
          pkg-config --print-errors --modversion graphblas

      - name: Set PKG_CONFIG_PATH for later steps
        run: echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib64/pkgconfig" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Download Zig (for Zigler)
        run: mix zig.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Verify NIFs compiled
        run: |
          find _build -maxdepth 5 -type f \( -name "*.so" -o -name "*.dylib" \) -print
          echo "---"
          find deps/zigler/priv -type f -name "*.so" -o -name "*.dylib" 2>/dev/null || echo "No pre-built Zigler libs"

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: mix test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: mix coveralls.github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
