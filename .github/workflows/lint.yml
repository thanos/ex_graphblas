name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: dev
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04

    # Pin to the canonical lint version -- this is not the build matrix.
    # The matrix for compatibility testing lives in elixir-build.yml.
    env:
      ELIXIR_VERSION: "1.19.5"
      OTP_VERSION: "28.4.1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-lint-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-lint-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install SuiteSparse:GraphBLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y libgraphblas-dev pkg-config

      - name: Install dependencies
        run: mix deps.get

      - name: Download Zig (for Zigler)
        run: mix zig.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: dev
          EX_GRAPHBLAS_BUILD: "1"

      - name: Run Credo
        run: mix credo --strict

      - name: Check documentation compiles without warnings
        run: |
          mix docs 2>&1 | tee /tmp/docs_output.txt
          if grep -i "warning" /tmp/docs_output.txt; then
            echo "ExDoc produced warnings -- failing."
            exit 1
          fi
        env:
          MIX_ENV: dev

      - name: Check for outdated dependencies
        run: mix hex.outdated || true

      - name: Check for unused locked dependencies
        run: mix deps.unlock --check-unused

      - name: Audit dependencies for known vulnerabilities
        run: mix deps.audit

